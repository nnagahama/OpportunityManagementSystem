<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社内案件管理システム</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>社内案件管理システム</h1>
  </header>

  <main class="container">
    <aside class="sidebar">
      <h2>ページ一覧</h2>
      <ul>
        <li><a href="#dashboard">ダッシュボード</a></li>
        <li><a href="#projects">案件一覧</a></li>
        <li><a href="#reports">レポート</a></li>
        <li><a href="#settings">設定</a></li>
        <li><a href="#contact">お問い合わせ</a></li>
      </ul>
    </aside>

    <section class="main-content">
      <h2>ようこそ</h2>
      <p>この社内案件管理システムは、案件の進捗管理、レポート確認、社内連携をシンプルにまとめるためのトップページです。レスポンシブ対応なので、パソコン・タブレット・スマートフォンのいずれでも快適に閲覧できます。</p>
      <div class="action-card">
        <h3>はじめに</h3>
        <p>左側のメニューから目的のページに移動してください。必要に応じて、案件の新規登録やレポート出力を行えます。</p>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 社内案件管理システム</p>
  </footer>
</body>
</html>
