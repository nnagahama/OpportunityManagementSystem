<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案件一覧画面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header id="header-root" aria-label="ページヘッダー">
    <!-- header will be loaded from ../header.html via JavaScript -->
  </header>

  <main class="container">
    <aside class="sidebar" id="sidebar-root" aria-label="ページ一覧">
      <!-- サイドバーは JavaScript で ../sidebar.html から読み込まれます -->
    </aside>

    <section class="main-content">
      <h2>案件一覧画面</h2>

      <h3>画面イメージ</h3>
        <img src="../images/OpportunityListImage.png" alt="案件一覧画面のイメージ" class="screenshot">

      <div class="action-card">
        <h3>処理概要</h3>
        <p>案件情報を一覧化し、現在のステータスの閲覧、および案件情報の検索を可能とする。</p>
      </div>

      <br />

      <h3>DB CRUD一覧</h3>
      <table class="status-table">
        <thead>
          <tr>
            <th>論理テーブル名</th>
            <th>物理テーブル名</th>
            <th>CRUD</th>
            <th>備考</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>営業ステータス区分</td>
            <td>M_SALES_STATUS</td>
            <td>R</td>
            <td></td>
          </tr>
          <tr>
            <td>顧客マスタ</td>
            <td>M_CUSTOMER</td>
            <td>R</td>
            <td></td>
          </tr>
          <tr>
            <td>営業担当者マスタ</td>
            <td>M_SALES_REP</td>
            <td>R</td>
            <td></td>
          </tr>
          <tr>
            <td>ユーザーマスタ</td>
            <td>M_USER</td>
            <td>R</td>
            <td></td>
          </tr>
          <tr>
              <td>案件情報</td>
              <td>T_OPPORTUNITY</td>
              <td>R</td>
              <td></td>
          </tr>
        </tbody>
      </table>

      <br />

      

      <h3>更新履歴</h3>
      <table class="status-table">
        <thead>
          <tr>
            <th>No.</th>
            <th>更新日</th>
            <th>更新者</th>
            <th>更新内容</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>2026/06/30</td>
            <td>長浜</td>
            <td>初版作成</td>
          </tr>
        </tbody>
      </table>

    </section>
  </main>

  <footer id="footer-root" aria-label="ページフッター">
    <!-- footer will be loaded from ../footer.html via JavaScript -->
  </footer>

  <script>
    (function(){
      const headerRoot = document.getElementById('header-root');
      const sidebarRoot = document.getElementById('sidebar-root');
      const footerRoot = document.getElementById('footer-root');

      const fetchText = (url) => fetch(url).then(resp => {
        if(!resp.ok) throw new Error(url + ' load failed');
        return resp.text();
      });

      Promise.allSettled([
        fetchText('../header.html'),
        fetchText('../sidebar.html'),
        fetchText('../footer.html')
      ])
      .then(results => {
        const [headerResult, sidebarResult, footerResult] = results;

        if(headerRoot) {
          if(headerResult.status === 'fulfilled') {
            const doc = new DOMParser().parseFromString(headerResult.value, 'text/html');
            const headerEl = doc.querySelector('header') || doc.body;
            headerRoot.innerHTML = headerEl.innerHTML;
          } else {
            headerRoot.innerHTML = '<h1>社内案件管理システム</h1>';
          }
        }

        if(sidebarRoot) {
          if(sidebarResult.status === 'fulfilled') {
            const doc = new DOMParser().parseFromString(sidebarResult.value, 'text/html');
            const aside = doc.querySelector('aside.sidebar') || doc.body;
            sidebarRoot.innerHTML = aside.innerHTML;
          } else {
            sidebarRoot.innerHTML = '<p>メニューの読み込みに失敗しました。</p>';
          }
        }

        if(footerRoot) {
          if(footerResult.status === 'fulfilled') {
            const doc = new DOMParser().parseFromString(footerResult.value, 'text/html');
            const footerEl = doc.querySelector('footer') || doc.body;
            footerRoot.innerHTML = footerEl.innerHTML;
          } else {
            footerRoot.innerHTML = '<p>&copy; 2026 サン・ライズ・システムズ株式会社. All rights reserved.</p>';
          }
        }
      })
      .catch(err => console.error('Loader error:', err));
    })();
  </script>
</body>
</html>
